port: 8080
svgFallbackLongSidePixelCount: 4096
database:
  type: "redis"
  connectionString: "localhost:6379"  # docker-compose: "redis:6379"
  namespace: "goframe"
timezone: "UTC"
logLevel: "info"
thumbnailWidth: 512
commands:
  - name: OrientationCommand
    orientation: portrait
    # rotateWhenSquare: false
    # clockwise: true
  - name: ScaleCommand
    height: 1920
    width: 1080
    edgeGradient: false
    edgeGradientBWThreshold: 0.75
  - name: CropCommand
    height: 1920
    width: 1080
  - name: DitherCommand
    # ditheringAlgorithm: atkinson
    palette:
      - [[0, 0, 0],[25, 30, 33]]
      - [[255, 255, 255],[232, 232, 232]]
      - [[255, 255, 0],[239, 222, 68]]
      - [[0, 0, 255],[33, 87, 186]]
      - [[255, 0, 0],[178, 19, 24]]
      - [[0, 255, 0],[18, 95, 32]]

# ---- image scheduler ----
goframeURL: "http://localhost:8080"  # docker-compose: "http://goframe:8080"
sourceName: xkcd
keepCount: 1
skipIfUnmanagedImagesExceed: 0
sources:
  xkcd:
    enabled: true
