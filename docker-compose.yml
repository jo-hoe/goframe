services:
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: >
      server
      -dir=/data
      -s3
      -s3.port=9000
      -s3.config=/etc/seaweedfs/s3.json
      -filer
      -master.volumeSizeLimitMB=64
      -volume.max=0
    ports:
      - "9000:9000"
    volumes:
      - seaweedfs-data:/data
      - type: bind
        source: ./docker-compose-s3.json
        target: /etc/seaweedfs/s3.json
        read_only: true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/status || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  goframe:
    build:
      context: .
      target: dev
    image: goframe:latest
    environment:
      CONFIG_PATH: /local.yaml
    ports:
      - "8080:8080"
    volumes:
      - type: bind
        source: ./local.yaml
        target: /local.yaml
        read_only: true
    depends_on:
      seaweedfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/probe || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  image-scheduler:
    build:
      context: .
      args:
        CMD: imagescheduler
    image: goframe-image-scheduler:latest
    environment:
      IMAGE_SCHEDULER_CONFIG_PATH: /local.yaml
    volumes:
      - type: bind
        source: ./local.yaml
        target: /local.yaml
        read_only: true
    depends_on:
      goframe:
        condition: service_healthy
    # Restart on failure mirrors CronJob retry behaviour during local development.
    # Set sources.xkcd.enabled: true in image-scheduler.yaml to trigger a real image fetch on startup.
    restart: "no"

volumes:
  seaweedfs-data:
