# Local k3d development overrides
# Applied to: helm upgrade --install goframe charts/goframe
timezone: "UTC"

server:
  image:
    repository: registry.localhost:5000/goframe
    tag: latest
    pullPolicy: Always
  port: 8080
  thumbnailWidth: 512
  logLevel: "info"
  svgFallbackLongSidePixelCount: 4096

commands:
  - name: RotationCommand
    steps: 1         # 1=90°, 2=180°, 3=270°
    clockwise: true  # optional, default: true

schedulers:
  - name: xkcd
    cron: "*/4 * * * *"
    source: xkcd
    keepCount: 1
    exclusionGroup: daily-wallpaper
    image:
      repository: registry.localhost:5000/goframe-image-scheduler
      tag: latest
      pullPolicy: Always
  - name: tumblr
    cron: "1-59/4 * * * *"
    source: tumblr
    keepCount: 1
    exclusionGroup: daily-wallpaper
    tumblr:
      blogs:
        - nasa
    image:
      repository: registry.localhost:5000/goframe-image-scheduler
      tag: latest
      pullPolicy: Always
  - name: deviantart
    cron: "2-59/4 * * * *"
    source: deviantart
    keepCount: 1
    exclusionGroup: daily-wallpaper
    deviantart:
      # DeviantArt RSS query syntax reference: https://www.deviantart.com/developers/rss
      # Test queries in browser: https://backend.deviantart.com/rss.xml?type=deviation&q=boost:popular+traditionalart
      # Multiple modifiers combined with spaces (URL-encoded as +).
      #
      # Ordering (mutually exclusive) — empirically verified:
      #   boost:popular  — all-time most-favourited, distinct ranking from sort:popular (confirmed)
      #   sort:popular   — popular with slightly different ranking than boost:popular (confirmed)
      #   sort:time      — newest submissions first (confirmed)
      #
      # Filtering:
      #   in:cat/subcat  — restrict to a category, e.g. in:digitalart/drawings
      #
      # Free-text:
      #   any bare word  — keyword/tag filter; must be combined with an ordering modifier
      query: "boost:popular traditionalart"
    image:
      repository: registry.localhost:5000/goframe-image-scheduler
      tag: latest
      pullPolicy: Always

  - name: metmuseum
    cron: "3-59/4 * * * *"
    source: metmuseum
    keepCount: 1
    exclusionGroup: daily-wallpaper
    # metmuseum.departmentIDs: omitted — searches all departments
    image:
      repository: registry.localhost:5000/goframe-image-scheduler
      tag: latest
      pullPolicy: Always


ingress:
  enabled: true
  className: traefik
  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix
