# Local k3d development overrides
# Applied to: helm upgrade --install goframe charts/goframe
timezone: "UTC"

server:
  image:
    repository: registry.localhost:5000/goframe
    tag: latest
    pullPolicy: Always
  port: 8080
  thumbnailWidth: 512
  logLevel: "info"
  svgFallbackLongSidePixelCount: 4096

commands:
  - name: RotationCommand
    steps: 1         # 1=90°, 2=180°, 3=270°
    clockwise: true  # optional, default: true

schedulers:
  - name: xkcd
    cron: "*/4 * * * *"
    source: xkcd
    group: daily-wallpaper
    image:
      repository: registry.localhost:5000/goframe-image-scheduler
      tag: latest
      pullPolicy: Always
  - name: tumblr
    cron: "1-59/4 * * * *"
    source: tumblr
    group: daily-wallpaper
    tumblr:
      blogs:
        - nasa
    image:
      repository: registry.localhost:5000/goframe-image-scheduler
      tag: latest
      pullPolicy: Always

  - name: metmuseum
    cron: "3-59/4 * * * *"
    source: metmuseum
    group: daily-wallpaper
    # metmuseum.departmentIDs: omitted — searches all departments
    image:
      repository: registry.localhost:5000/goframe-image-scheduler
      tag: latest
      pullPolicy: Always

  # - name: s3
  #   cron: "3-59/4 * * * *"
  #   source: s3
  #   group: daily-wallpaper
  #   s3:
  #     endpoint: "https://s3.us-east-1.amazonaws.com"  # or "http://rustfs:9000" for RustFS
  #     bucket: "my-images"
  #     prefix: "wallpapers/"   # optional; omit to use all objects in the bucket
  #     region: "us-east-1"     # any non-empty value for RustFS
  #     accessKey: "AKIAIOSFODNN7EXAMPLE"  # omit for public buckets
  #     secretKey: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"  # omit for public buckets
  #   image:
  #     repository: registry.localhost:5000/goframe-image-scheduler
  #     tag: latest
  #     pullPolicy: Always

  - name: nasa-apod
    cron: "2-59/4 * * * *"
    source: nasaapod
    group: daily-wallpaper
    # nasaapod.apiKeySecretRef: omitted — uses NASA demo key (30 req/hour/IP)
    # To use a production key, create a Secret and set apiKeySecretRef: "nasa-apod-credentials"
    image:
      repository: registry.localhost:5000/goframe-image-scheduler
      tag: latest
      pullPolicy: Always

  - name: nasa-image-of-the-day
    cron: "3-59/4 * * * *"
    source: nasaimageoftheday
    group: daily-wallpaper
    image:
      repository: registry.localhost:5000/goframe-image-scheduler
      tag: latest
      pullPolicy: Always


ingress:
  enabled: true
  className: traefik
  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix
