# local.example.yaml — unified local development configuration.
# Used by both the goframe server and the image scheduler binary.
# Copy to local.yaml and adjust as needed.
# For k3d/k8s deployments, configure via charts/goframe/values.yaml instead.

# ---- goframe server ----
port: 8080
logLevel: "info"
thumbnailWidth: 512
svgFallbackLongSidePixelCount: 4096
timezone: "UTC"
database:
  type: "redis"
  connectionString: "localhost:6379"  # docker-compose: "redis:6379"
  namespace: "goframe"
commands:
  - name: RotationCommand
    steps: 1         # 1=90°, 2=180°, 3=270°
    clockwise: true  # optional, default: true
  # - name: ScaleCommand
  #   height: 1920
  #   width: 1080
  #   edgeGradient: false
  #   edgeGradientBWThreshold: 0.75
  # - name: CropCommand
  #   height: 1600
  #   width: 1200
  # - name: DitherCommand
  #   # ditheringAlgorithm: atkinson
  #   palette:
  #     - [[0, 0, 0],[25, 30, 33]]
  #     - [[255, 255, 255],[232, 232, 232]]
  #     - [[255, 255, 0],[239, 222, 68]]
  #     - [[0, 0, 255],[33, 87, 186]]
  #     - [[255, 0, 0],[178, 19, 24]]
  #     - [[0, 255, 0],[18, 95, 32]]

# ---- image scheduler ----
goframeURL: "http://localhost:8080"  # docker-compose: "http://goframe:8080"
sourceName: xkcd
source: xkcd
keepCount: 1
# whenUnmanaged: upload  # upload (default), skip (keep own images), drain (delete own images)
# exclusionGroup: daily-wallpaper   # schedulers in the same group evict each other's images on upload
# groupMembers: [xkcd, tumblr]     # populated automatically by the operator; set manually for local runs
# commands:  # scheduler-specific pipeline (separate from server commands above)
#   - name: ScaleCommand
#     height: 1200
#     width: 1600

# ---- deviantart source (set source: deviantart to activate) ----
# DeviantArt RSS query syntax reference: https://www.deviantart.com/developers/rss
# Test queries in browser: https://backend.deviantart.com/rss.xml?type=deviation&q=boost:popular+traditionalart
# Multiple modifiers combined with spaces (URL-encoded as +).
# A bare keyword without an ordering modifier causes the feed to error.
#
# Ordering (mutually exclusive) — empirically verified:
#   boost:popular  — all-time most-favourited, distinct ranking from sort:popular (confirmed)
#   sort:popular   — popular with slightly different ranking than boost:popular (confirmed)
#   sort:time      — newest submissions first (confirmed)
#   boost:<other>  — all other boost: values (hot, new, recent, rising, trending, …)
#                    silently fall back to popular or error; do not use
#
# Filtering:
#   in:cat/subcat  — restrict to a category, e.g. in:digitalart/drawings
#                    or in:traditionalart/paintings (confirmed working)
#   by:/meta:      — documented but currently error on the backend; do not use
#
# Free-text:
#   any bare word  — keyword/tag filter, e.g. lofi, landscape, traditionalart
#                    must be combined with an ordering modifier or the feed errors
# query: "boost:popular traditionalart"  # ordering: all-time popular; keyword: traditionalart category

# ---- tumblr source (set source: tumblr to activate) ----
# Fetches a random image from one of the listed public Tumblr blogs' RSS feeds.
# blogs: required. List of blog names without the .tumblr.com suffix. One is picked randomly per run.
# blogs:
#   - nasa
#   - pusheen

# ---- metmuseum source (set source: metmuseum to activate) ----
# Fetches a random highlighted, public-domain artwork from The Metropolitan Museum of Art.
# All images are hand-curated by Met art historians — no AI, high-resolution JPEGs.
# API reference: https://metmuseum.github.io/
#
# departmentIDs is optional. Omit (or leave empty) to search all departments.
# Available department IDs:
#   1  — American Decorative Arts
#   3  — Ancient West Asian Art
#   4  — Arms and Armor
#   5  — Arts of Africa, Oceania, and the Americas
#   6  — Asian Art            (Japanese woodblocks, Chinese ink paintings, Indian miniatures)
#   7  — The Cloisters
#   8  — The Costume Institute
#   9  — Drawings and Prints  (watercolors, sketches, engravings)
#   10 — Egyptian Art
#   11 — European Paintings   (oil on canvas: Van Dyck, Vermeer, El Greco, …)
#   12 — European Sculpture and Decorative Arts
#   13 — Greek and Roman Art
#   14 — Islamic Art
#   15 — The Robert Lehman Collection
#   17 — Medieval Art
#   19 — Photographs
#   21 — Modern Art
#
# departmentIDs:
#   - 6   # Asian Art
#   - 9   # Drawings and Prints
#   - 11  # European Paintings

# ---- s3 source (set source: s3 to activate) ----
# Fetches a random image object from an S3-compatible bucket (AWS S3, RustFS, MinIO, etc.).
# Uses AWS Signature Version 4 over plain HTTP — no AWS SDK required.
#
# endpoint: base URL of the S3-compatible service (no trailing slash, no bucket path).
#   For AWS S3:  "https://s3.<region>.amazonaws.com"
#   For RustFS:  "http://rustfs:9000"
#   For MinIO:   "http://minio:9000"
# bucket:    required. Name of the bucket to fetch images from.
# prefix:    optional. Key prefix to filter objects, e.g. "wallpapers/".
#            Omit to use all objects in the bucket.
# region:    required. AWS region (e.g. "us-east-1"). For RustFS any non-empty value works.
# accessKey: required. Access key ID.
# secretKey: required. Secret access key.
#
# endpoint: "https://s3.us-east-1.amazonaws.com"
# bucket: "my-images"
# prefix: "wallpapers/"
# region: "us-east-1"
# accessKey: "AKIAIOSFODNN7EXAMPLE"
# secretKey: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
