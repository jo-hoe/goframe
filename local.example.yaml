# local.example.yaml — unified local development configuration.
# Used by both the goframe server and the image scheduler binary.
# Copy to local.yaml and adjust as needed.
# For k3d/k8s deployments, configure via charts/goframe/values.yaml instead.

# ---- goframe server ----
port: 8080
logLevel: "info"
thumbnailWidth: 512
svgFallbackLongSidePixelCount: 4096
timezone: "UTC"
database:
  type: "redis"
  connectionString: "localhost:6379"  # docker-compose: "redis:6379"
  namespace: "goframe"
commands:
  - name: RotationCommand
    steps: 1         # 1=90°, 2=180°, 3=270°
    clockwise: true  # optional, default: true
  # - name: ScaleCommand
  #   height: 1920
  #   width: 1080
  #   edgeGradient: false
  #   edgeGradientBWThreshold: 0.75
  # - name: CropCommand
  #   height: 1600
  #   width: 1200
  # - name: DitherCommand
  #   # ditheringAlgorithm: atkinson
  #   palette:
  #     - [[0, 0, 0],[25, 30, 33]]
  #     - [[255, 255, 255],[232, 232, 232]]
  #     - [[255, 255, 0],[239, 222, 68]]
  #     - [[0, 0, 255],[33, 87, 186]]
  #     - [[255, 0, 0],[178, 19, 24]]
  #     - [[0, 255, 0],[18, 95, 32]]

# ---- image scheduler ----
goframeURL: "http://localhost:8080"  # docker-compose: "http://goframe:8080"
sourceName: xkcd
source: xkcd
keepCount: 1
# exclusionGroup: daily-wallpaper   # schedulers in the same group evict each other's images on upload
# groupMembers: [xkcd, pusheen]     # populated automatically by the operator; set manually for local runs
# commands:  # scheduler-specific pipeline (separate from server commands above)
#   - name: ScaleCommand
#     height: 1200
#     width: 1600

# ---- deviantart source (set source: deviantart to activate) ----
# DeviantArt RSS query syntax reference: https://www.deviantart.com/developers/rss
# Test queries in browser: https://backend.deviantart.com/rss.xml?type=deviation&q=boost:popular+traditionalart
# Multiple modifiers combined with spaces (URL-encoded as +).
# A bare keyword without an ordering modifier causes the feed to error.
#
# Ordering (mutually exclusive) — empirically verified:
#   boost:popular  — all-time most-favourited, distinct ranking from sort:popular (confirmed)
#   sort:popular   — popular with slightly different ranking than boost:popular (confirmed)
#   sort:time      — newest submissions first (confirmed)
#   boost:<other>  — all other boost: values (hot, new, recent, rising, trending, …)
#                    silently fall back to popular or error; do not use
#
# Filtering:
#   in:cat/subcat  — restrict to a category, e.g. in:digitalart/drawings
#                    or in:traditionalart/paintings (confirmed working)
#   by:/meta:      — documented but currently error on the backend; do not use
#
# Free-text:
#   any bare word  — keyword/tag filter, e.g. lofi, landscape, traditionalart
#                    must be combined with an ordering modifier or the feed errors
# query: "boost:popular traditionalart"
