image:
  repository: ghcr.io/jo-hoe/goframe-operator
  tag: ""
  pullPolicy: IfNotPresent

leaderElection:
  enabled: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Number of operator replicas (>1 requires leaderElection.enabled: true)
replicaCount: 1
