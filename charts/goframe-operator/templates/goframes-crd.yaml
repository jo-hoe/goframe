                properties:
                  image:
                    description: Image configures the container image for the server
                      Deployment.
                    properties:
                      pullPolicy:
                        description: PullPolicy is the Kubernetes image pull policy.
                        enum:
                        - Always
                        - Never
                        - IfNotPresent
                        type: string
                      repository:
                        description: Repository is the image repository (e.g. "ghcr.io/jo-hoe/goframe").
                        type: string
                      tag:
                        description: Tag is the image tag (e.g. "latest", "v1.2.3").
                        type: string
                    type: object
                  logLevel:
                    default: info
                    description: LogLevel sets the server log verbosity (debug, info,
                      warn, error).
                    type: string
                  port:
                    default: 8080
                    description: Port is the HTTP port the server listens on.
                    format: int32
                    type: integer
                  serviceType:
                    default: ClusterIP
                    description: ServiceType is the Kubernetes Service type for the
                      server (ClusterIP, NodePort, LoadBalancer).
                    enum:
                    - ClusterIP
                    - NodePort
                    - LoadBalancer
                    type: string
                  svgFallbackLongSidePixelCount:
                    default: 4096
                    description: SvgFallbackLongSidePixelCount is the rasterization
                      size for SVG images.
                    type: integer
                  thumbnailWidth:
                    default: 512
                    description: ThumbnailWidth is the pixel width for generated thumbnails.
                    type: integer
                type: object
              timezone:
                default: UTC
                description: Timezone for image rotation midnight detection.
                type: string
            type: object
          status:
