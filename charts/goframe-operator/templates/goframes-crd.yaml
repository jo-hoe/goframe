                      Address is the Redis connection string (host:port) the operator and server use.
                      Typically points at a Redis instance deployed via a separate Helm chart.
                    example: redis-master.default.svc.cluster.local:6379
                    type: string
                required:
                - address
                type: object
              schedulers:
                description: Schedulers defines one CronJob per entry for automated
                  image ingestion.
                items:
