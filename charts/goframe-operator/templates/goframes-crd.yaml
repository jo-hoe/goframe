      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: GoFrame is the Schema for the goframes API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: GoFrameSpec defines the desired state of GoFrame.
            properties:
              commands:
                description: Commands is the image-processing pipeline applied to
                  every ingested image.
                items:
                  description: CommandSpec describes a single image-processing command
                    in the pipeline.
                  properties:
                    name:
                      description: Name is the registered command name (e.g. "scale",
                        "dither").
                      type: string
                    params:
                      description: |-
                        Params are command-specific parameters. The schema is open to allow diverse
                        command configurations; validated at runtime by the command implementation.
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - name
                  type: object
                type: array
              redis:
                description: Redis configures the Redis Deployment managed by the
