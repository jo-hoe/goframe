                      description: |-
                        KeepCount is the maximum number of images to retain from this source.
                        Older images beyond this count are deleted after each run.
                      type: integer
                    logLevel:
                      default: info
                      description: LogLevel sets the scheduler log verbosity (debug,
                        info, warn, error).
                      type: string
                    name:
                      description: Name uniquely identifies this scheduler within
                        the GoFrame instance.
                      type: string
                    query:
                      description: |-
                        Query is a source-specific search string. Required when source is "deviantart".
                        Uses DeviantArt search syntax, e.g. "boost:popular tag:lofi".
                      type: string
                    source:
                      description: Source is the image source identifier passed to
                        the scheduler binary (e.g. "xkcd", "pusheen", "deviantart").
                      type: string
                    whenUnmanaged:
                      description: |-
                        WhenUnmanaged controls scheduler behaviour when unmanaged images exist.
                        Valid values: upload (default), skip, drain.
                      enum:
                      - upload
                      - skip
                      - drain
                      type: string
