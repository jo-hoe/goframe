{{- if not .Values.credentials.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rustfs.fullname" . }}-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "rustfs.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  {{- if .Values.credentials.accessKey }}
  accessKey: {{ .Values.credentials.accessKey | b64enc | quote }}
  {{- else }}
  accessKey: {{ randAlphaNum 16 | b64enc | quote }}
  {{- end }}
  {{- if .Values.credentials.secretKey }}
  secretKey: {{ .Values.credentials.secretKey | b64enc | quote }}
  {{- else }}
  secretKey: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
