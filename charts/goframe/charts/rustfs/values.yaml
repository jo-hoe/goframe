image:
  # -- RustFS container image repository
  repository: rustfs/rustfs
  # -- RustFS container image tag
  tag: "latest"
  # -- Image pull policy for the RustFS container
  pullPolicy: IfNotPresent

service:
  # -- Port the RustFS service listens on
  port: 9000

# -- Resource limits for the RustFS container.
# For ~100 images, 128Mi memory is sufficient.
resources:
  requests:
    # -- CPU request for the RustFS pod
    cpu: 25m
    # -- Memory request for the RustFS pod
    memory: 64Mi
  limits:
    # -- CPU limit for the RustFS pod
    cpu: 100m
    # -- Memory limit for the RustFS pod
    memory: 128Mi

# -- Credentials for the built-in RustFS instance.
# Leave all fields empty to auto-generate a random secret.
credentials:
  # -- Name of a pre-existing Kubernetes Secret with keys `accessKey` and `secretKey`. Takes precedence over accessKey/secretKey below.
  existingSecret: ""
  # -- RustFS access key. Ignored when existingSecret is set; auto-generated when both are empty.
  accessKey: ""
  # -- RustFS secret key. Ignored when existingSecret is set; auto-generated when both are empty.
  secretKey: ""

persistence:
  # -- Enable persistent storage for RustFS
  enabled: true
  # -- Persistent volume size
  size: 1Gi
  # -- StorageClass for the persistent volume. Empty = cluster default.
  storageClass: ""
  # -- Access mode for the persistent volume
  accessMode: ReadWriteOnce
