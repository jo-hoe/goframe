{{- if not .Values.seaweedfs.secretRef }}
{{- $secretName := printf "%s-seaweedfs-credentials" .Release.Name }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $accessKey := "" }}
{{- if .Values.seaweedfs.credentials.accessKey }}
{{- $accessKey = .Values.seaweedfs.credentials.accessKey }}
{{- else if and $existing $existing.data $existing.data.accessKey }}
{{- $accessKey = (index $existing.data "accessKey") | b64dec }}
{{- else }}
{{- $accessKey = randAlphaNum 16 }}
{{- end }}
{{- $secretKey := "" }}
{{- if .Values.seaweedfs.credentials.secretKey }}
{{- $secretKey = .Values.seaweedfs.credentials.secretKey }}
{{- else if and $existing $existing.data $existing.data.secretKey }}
{{- $secretKey = (index $existing.data "secretKey") | b64dec }}
{{- else }}
{{- $secretKey = randAlphaNum 32 }}
{{- end }}
{{- $identity := dict "identities" (list (dict "name" "admin" "credentials" (list (dict "accessKey" $accessKey "secretKey" $secretKey)) "actions" (list "Admin" "Read" "Write" "List" "Tagging"))) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  accessKey: {{ $accessKey | quote }}
  secretKey: {{ $secretKey | quote }}
  s3.json: |
    {{ $identity | toJson }}
{{- end }}
