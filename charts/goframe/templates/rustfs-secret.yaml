{{- if not .Values.rustfs.secretRef }}
{{- $secretName := printf "%s-rustfs-credentials" .Release.Name }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: rustfs
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  {{- if .Values.rustfs.credentials.accessKey }}
  accessKey: {{ .Values.rustfs.credentials.accessKey | b64enc | quote }}
  {{- else if and $existing $existing.data $existing.data.accessKey }}
  accessKey: {{ $existing.data.accessKey | quote }}
  {{- else }}
  accessKey: {{ randAlphaNum 16 | b64enc | quote }}
  {{- end }}
  {{- if .Values.rustfs.credentials.secretKey }}
  secretKey: {{ .Values.rustfs.credentials.secretKey | b64enc | quote }}
  {{- else if and $existing $existing.data $existing.data.secretKey }}
  secretKey: {{ $existing.data.secretKey | quote }}
  {{- else }}
  secretKey: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
