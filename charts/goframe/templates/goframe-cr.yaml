apiVersion: goframe.io/v1alpha1
kind: GoFrame
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  timezone: {{ .Values.timezone | quote }}

  objectStorage:
    {{- if .Values.seaweedfs.address }}
    endpoint: {{ .Values.seaweedfs.address | quote }}
    {{- else }}
    endpoint: {{ printf "http://%s-seaweedfs.%s.svc.cluster.local:9000" .Release.Name .Release.Namespace | quote }}
    {{- end }}
    {{- if .Values.seaweedfs.bucket }}
    bucket: {{ .Values.seaweedfs.bucket | quote }}
    {{- end }}
    {{- if .Values.seaweedfs.secretRef }}
    secretRef: {{ .Values.seaweedfs.secretRef | quote }}
    {{- else }}
    secretRef: {{ printf "%s-seaweedfs-credentials" .Release.Name | quote }}
    {{- end }}
    {{- if .Values.seaweedfs.imageBaseURL }}
    imageBaseURL: {{ .Values.seaweedfs.imageBaseURL | quote }}
    {{- end }}

  server:
    image:
      repository: {{ .Values.server.image.repository | quote }}
      tag: {{ .Values.server.image.tag | default .Chart.AppVersion | quote }}
      pullPolicy: {{ .Values.server.image.pullPolicy | quote }}
    port: {{ .Values.server.port }}
    thumbnailWidth: {{ .Values.server.thumbnailWidth }}
    logLevel: {{ .Values.server.logLevel | quote }}
    svgFallbackLongSidePixelCount: {{ .Values.server.svgFallbackLongSidePixelCount }}
    serviceType: {{ .Values.server.serviceType | quote }}

  {{- if .Values.commands }}
  commands:
    {{- range .Values.commands }}
    - name: {{ .name | quote }}
      {{- $params := omit . "name" }}
      {{- if $params }}
      params: {{ $params | toJson }}
      {{- end }}
    {{- end }}
  {{- end }}

  {{- if .Values.schedulers }}
  schedulers:
    {{- range .Values.schedulers }}
    - name: {{ .name | quote }}
      cron: {{ .cron | quote }}
      source: {{ .source | quote }}
      {{- if .group }}
      group: {{ .group | quote }}
      {{- end }}
      {{- if .onExternalImages }}
      onExternalImages: {{ .onExternalImages | quote }}
      {{- end }}
      {{- if .metmuseum }}
      metmuseum:
        {{- if .metmuseum.departmentIDs }}
        departmentIDs:
          {{- range .metmuseum.departmentIDs }}
          - {{ . }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- if .tumblr }}
      tumblr:
        blogs:
          {{- range .tumblr.blogs }}
          - {{ . | quote }}
          {{- end }}
      {{- end }}
      {{- if .s3 }}
      s3:
        endpoint: {{ .s3.endpoint | quote }}
        bucket: {{ .s3.bucket | quote }}
        {{- if .s3.prefix }}
        prefix: {{ .s3.prefix | quote }}
        {{- end }}
        region: {{ .s3.region | quote }}
        {{- if .s3.secretRef }}
        secretRef: {{ .s3.secretRef | quote }}
        {{- else if and .s3.accessKey .s3.secretKey }}
        secretRef: {{ printf "%s-sched-%s-s3-credentials" $.Release.Name .name | quote }}
        {{- end }}
      {{- end }}
      {{- if .commands }}
      commands:
        {{- range .commands }}
        - name: {{ .name | quote }}
          {{- $params := omit . "name" }}
          {{- if $params }}
          params: {{ $params | toJson }}
          {{- end }}
        {{- end }}
      {{- end }}
      image:
        repository: {{ ((.image).repository) | default $.Values.schedulerImage.repository | quote }}
        tag: {{ ((.image).tag) | default $.Chart.AppVersion | quote }}
        pullPolicy: {{ ((.image).pullPolicy) | default $.Values.schedulerImage.pullPolicy | quote }}
    {{- end }}
  {{- end }}
