# Timezone for image rotation midnight detection (IANA timezone name)
timezone: "UTC"

# Redis connection address passed to the GoFrame CR.
# Defaults to the Redis service deployed alongside this chart.
# Override to point at your own Redis instance.
redis:
  address: ""

server:
  image:
    repository: ghcr.io/jo-hoe/goframe
    tag: ""
    pullPolicy: IfNotPresent
  port: 8080
  thumbnailWidth: 512
  logLevel: "info"
  svgFallbackLongSidePixelCount: 4096
  # serviceType controls how the server Service is exposed.
  # Valid values: ClusterIP, NodePort, LoadBalancer
  serviceType: "ClusterIP"

# Image processing pipeline applied to every ingested image.
# Supported commands: OrientationCommand, ScaleCommand, PixelScaleCommand,
#                     CropCommand, PngConverterCommand, DitherCommand
# Examples (uncomment to use):
# commands:
#   - name: OrientationCommand
#     params:
#       orientation: portrait
#   - name: ScaleCommand
#     params:
#       height: 1920
#       width: 1080
#   - name: DitherCommand
#     params:
#       ditheringAlgorithm: atkinson
#       palette:
#         - [[0, 0, 0],[25, 30, 33]]
#         - [[255, 255, 255],[232, 232, 232]]
commands: []

# Default image used for scheduler CronJobs when no per-scheduler image is specified.
schedulerImage:
  repository: ghcr.io/jo-hoe/goframe-image-scheduler
  tag: ""
  pullPolicy: IfNotPresent

# CronJob-based image schedulers (one CronJob per entry).
# Each entry requires: name, cron, source
# Supported sources: xkcd, pusheen, oatmeal
#
# exclusionGroup: optional. Schedulers sharing the same group evict each other's images on
# a successful upload, so only one group member's image is displayed at a time. Use this to
# stagger different sources across days or time periods.
#
# Example — weekday/weekend stagger:
# schedulers:
#   - name: weekday-xkcd
#     cron: "0 8 * * 1-5"
#     source: xkcd
#     keepCount: 1
#     exclusionGroup: daily-wallpaper
#   - name: weekend-pusheen
#     cron: "0 8 * * 6,0"
#     source: pusheen
#     keepCount: 1
#     exclusionGroup: daily-wallpaper
#
# Example — single source with per-scheduler processing pipeline:
# schedulers:
#   - name: xkcd
#     cron: "0 8 * * *"
#     source: xkcd
#     keepCount: 1
#     commands:
#       - name: ScaleCommand
#         height: 1600
#         width: 1200
#     image:
#       repository: ghcr.io/jo-hoe/goframe-image-scheduler
#       tag: ""
#       pullPolicy: IfNotPresent
schedulers: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: goframe.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
