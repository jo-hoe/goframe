# Timezone for image rotation midnight detection (IANA timezone name)
timezone: "UTC"

# Redis connection address passed to the GoFrame CR.
# Defaults to the Redis service deployed alongside this chart.
# Override to point at your own Redis instance.
redis:
  address: ""

server:
  image:
    repository: ghcr.io/jo-hoe/goframe
    tag: ""
    pullPolicy: IfNotPresent
  port: 8080
  thumbnailWidth: 512
  logLevel: "info"
  svgFallbackLongSidePixelCount: 4096
  # serviceType controls how the server Service is exposed.
  # Valid values: ClusterIP, NodePort, LoadBalancer
  serviceType: "ClusterIP"

# Image processing pipeline applied to every ingested image.
# Supported commands: OrientationCommand, ScaleCommand, PixelScaleCommand,
#                     CropCommand, PngConverterCommand, DitherCommand
# Examples (uncomment to use):
# commands:
#   - name: OrientationCommand
#     params:
#       orientation: portrait
#   - name: ScaleCommand
#     params:
#       height: 1920
#       width: 1080
#   - name: DitherCommand
#     params:
#       ditheringAlgorithm: atkinson
#       palette:
#         - [[0, 0, 0],[25, 30, 33]]
#         - [[255, 255, 255],[232, 232, 232]]
commands: []

# Default image used for scheduler CronJobs when no per-scheduler image is specified.
schedulerImage:
  repository: ghcr.io/jo-hoe/goframe-image-scheduler
  tag: ""
  pullPolicy: IfNotPresent

# CronJob-based image schedulers (one CronJob per entry).
# Each entry requires: name, cron, source
# Supported sources: xkcd, pusheen, oatmeal, deviantart, metmuseum
#
# exclusionGroup: optional. Schedulers sharing the same group evict each other's images on
# a successful upload, so only one group member's image is displayed at a time. Use this to
# stagger different sources across days or time periods.
#
# query: required when source is "deviantart".
# DeviantArt RSS query syntax reference: https://www.deviantart.com/developers/rss
# Test queries in browser: https://backend.deviantart.com/rss.xml?type=deviation&q=boost:popular+traditionalart
# Multiple modifiers combined with spaces (URL-encoded as +).
# A bare keyword without an ordering modifier causes the feed to error.
#
# Ordering (mutually exclusive) — empirically verified:
#   boost:popular  — all-time most-favourited, distinct ranking from sort:popular (confirmed)
#   sort:popular   — popular with slightly different ranking than boost:popular (confirmed)
#   sort:time      — newest submissions first (confirmed)
#   boost:<other>  — all other boost: values (hot, new, recent, rising, trending, …)
#                    silently fall back to popular or error; do not use
#
# Filtering:
#   in:cat/subcat  — restrict to a category, e.g. in:digitalart/drawings
#                    or in:traditionalart/paintings (confirmed working)
#   by:/meta:      — documented but currently error on the backend; do not use
#
# Free-text:
#   any bare word  — keyword/tag filter, e.g. lofi, landscape, traditionalart
#                    must be combined with an ordering modifier or the feed errors
#
# Example — weekday/weekend stagger:
# schedulers:
#   - name: weekday-xkcd
#     cron: "0 8 * * 1-5"
#     source: xkcd
#     keepCount: 1
#     exclusionGroup: daily-wallpaper
#   - name: weekend-pusheen
#     cron: "0 8 * * 6,0"
#     source: pusheen
#     keepCount: 1
#     exclusionGroup: daily-wallpaper
#
# Example — deviantart with query:
# schedulers:
#   - name: deviantart-daily
#     cron: "0 8 * * *"
#     source: deviantart
#     query: "boost:popular traditionalart"  # ordering: all-time popular; keyword: traditionalart category
#     keepCount: 1
#
# Example — metmuseum with department filter:
# schedulers:
#   - name: met-daily
#     cron: "0 8 * * *"
#     source: metmuseum
#     keepCount: 1
#     # departmentIDs is optional — omit to search all departments.
#     # Available IDs:
#     #   1=American Decorative Arts  3=Ancient West Asian Art  4=Arms and Armor
#     #   5=Arts of Africa, Oceania, and the Americas           6=Asian Art
#     #   7=The Cloisters             8=The Costume Institute   9=Drawings and Prints
#     #   10=Egyptian Art             11=European Paintings     12=European Sculpture
#     #   13=Greek and Roman Art      14=Islamic Art            15=Robert Lehman Collection
#     #   17=Medieval Art             19=Photographs            21=Modern Art
#     departmentIDs:
#       - 6   # Asian Art
#       - 9   # Drawings and Prints
#       - 11  # European Paintings
#
# Example — single source with per-scheduler processing pipeline:
# schedulers:
#   - name: xkcd
#     cron: "0 8 * * *"
#     source: xkcd
#     keepCount: 1
#     commands:
#       - name: ScaleCommand
#         height: 1600
#         width: 1200
#     image:
#       repository: ghcr.io/jo-hoe/goframe-image-scheduler
#       tag: ""
#       pullPolicy: IfNotPresent
schedulers: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: goframe.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
